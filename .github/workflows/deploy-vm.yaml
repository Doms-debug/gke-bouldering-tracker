name: Deploy to VM

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  ZONE: us-central1-a
  VM_NAME: bouldering-free-vm

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy via SSH
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} --zone=${{ env.ZONE }} --project=${{ env.PROJECT_ID }} --quiet --command="
            cd /home/domikepaczajka77/gke-bouldering-tracker &&
            sudo git config --global --add safe.directory /home/domikepaczajka77/gke-bouldering-tracker &&
            sudo git pull origin main &&
            sudo docker-compose up -d --build
          "