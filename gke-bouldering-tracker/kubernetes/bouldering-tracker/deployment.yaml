apiVersion: apps/v1
kind: Deployment
metadata:
  name: bouldering-tracker-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bouldering-tracker
  template:
    metadata:
      labels:
        app: bouldering-tracker
    spec:
      containers:
      - name: api
        image: nginx:alpine
        ports:
        - containerPort: 80