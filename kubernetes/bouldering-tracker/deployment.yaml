apiVersion: apps/v1
kind: Deployment
metadata:
  name: bouldering-tracker-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bouldering-tracker
  template:
    metadata:
      labels:
        app: bouldering-tracker
    spec:
      containers:
      - name: api
        image: europe-central2-docker.pkg.dev/prj-cloud-sandbox-repo/bouldering-repo/bouldering-api:e6e8134
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "20m"    
            memory: "32Mi" 
          limits:
            cpu: "250m"     
            memory: "256Mi"